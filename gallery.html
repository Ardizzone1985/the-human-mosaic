<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Gallery – The Human Mosaic</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f8f8f6;
      color: #111;
      padding: 40px;
    }

    .container {
      width: min(1200px, 94%);
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: clamp(2.3rem, 5vw, 4rem);
      margin-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
      font-size: 1.05rem;
    }

    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 30px;
    }

    .filter-btn {
      border: 1px solid #111;
      background: white;
      color: #111;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #111;
      color: white;
    }

    .top-actions {
      text-align: center;
      margin-bottom: 30px;
    }

    .cta-btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 14px;
      background: #111;
      color: white;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .cta-btn:hover {
      background: #333;
      transform: translateY(-2px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #ddd;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .error {
      text-align: center;
      color: red;
      margin-top: 25px;
      font-size: 1rem;
    }

    .count-box {
      text-align: center;
      margin-bottom: 25px;
      color: #444;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Live Gallery</h1>
    <p class="subtitle">
      Explore the approved contributions already shaping The Human Mosaic.
    </p>

    <div class="top-actions">
      <a class="cta-btn" href="join.html">Claim Your Spot</a>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-room="All">All</button>
      <button class="filter-btn" data-room="Identity">Identity</button>
      <button class="filter-btn" data-room="Love">Love</button>
      <button class="filter-btn" data-room="Creativity">Creativity</button>
    </div>
