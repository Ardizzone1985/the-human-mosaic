<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Gallery – The Human Mosaic</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(248,248,246,0.78), rgba(248,248,246,0.88)),
        url('hero-background.jpg') center/cover no-repeat fixed;
      padding: 40px;
      margin: 0;
      color: #111;
    }

    .container {
      width: min(1250px, 95%);
      margin: 0 auto;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: #111;
    }

    .brand img { height: 74px; }

    .brand-title { font-weight: 700; }
    .brand-tagline {
      font-size: 0.78rem;
      color: #666;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      text-align: center;
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      margin: 10px 0 12px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      max-width: 780px;
      margin: 0 auto 30px;
    }

    .top-actions {
      text-align: center;
      margin-bottom: 30px;
    }

    .join-btn, .ghost-btn {
      display: inline-block;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 16px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .join-btn {
      background: #111;
      color: white;
      border: 1px solid #111;
    }

    .join-btn:hover { background: #333; }

    .ghost-btn {
      background: white;
      color: #111;
      border: 1px solid #111;
    }

    .ghost-btn:hover {
      background: #111;
      color: white;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-btn {
      border: 1px solid #111;
      background: white;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .filter-btn.active {
      background: #111;
      color: white;
    }

    .status-message {
      text-align: center;
      margin-bottom: 22px;
      color: #666;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #ddd;
      transition: 0.3s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.12);
    }

    .card.highlight {
      outline: 3px solid #111;
      transform: scale(1.05);
      z-index: 10;
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      cursor: zoom-in;
      transition: 0.35s;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card-info {
      padding: 14px 16px 18px;
    }

    .room-tag {
      font-size: 0.72rem;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .room-tag.identity { color: #1d4ed8; }
.room-tag.love { color: #b91c1c; }
.room-tag.creativity { color: #7c3aed; }
    
    .card-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-note-preview {
      color: #666;
      font-size: 0.9rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal.open { display: flex; }

    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
    }

  </style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <a href="index.html" class="brand">
      <img src="logo-cropped.png" alt="The Human Mosaic Logo">
      <div>
        <div class="brand-title">The Human Mosaic</div>
        <div class="brand-tagline">One Humanity. Millions of Faces. One Mosaic.</div>
      </div>
    </a>
  </div>

  <h1>Live Gallery</h1>

  <p class="subtitle">
    Explore approved participant submissions across the three growing rooms of The Human Mosaic.
  </p>

  <div class="top-actions">
    <a href="join.html" class="join-btn">Claim Your Spot</a>
    <a href="index.html" class="ghost-btn" style="margin-left:10px;">Back to Website</a>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-room="all">All</button>
    <button class="filter-btn" data-room="Identity">Identity</button>
    <button class="filter-btn" data-room="Love">Love</button>
    <button class="filter-btn" data-room="Creativity">Creativity</button>
  </div>

  <div id="statusMessage" class="status-message"></div>
  <div class="grid" id="gallery"></div>

</div>

<script>
const SUPABASE_URL = "https://cqpujmwfiqbwdsmuwkmb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcHVqbXdmaXFid2RzbXV3a21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTMzODAsImV4cCI6MjA4OTg2OTM4MH0.lW9zvuBYYvrCvUoVApTCh0-ITuXwescPv3qJg1lNDDY";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const gallery = document.getElementById("gallery");
const statusMessage = document.getElementById("statusMessage");
const filterButtons = document.querySelectorAll(".filter-btn");

const params = new URLSearchParams(window.location.search);
const highlightId = params.get("id");

let allImages = [];
let currentRoom = "all";

function getRoomClass(room) {
  if (!room) return "";
  return room.toLowerCase();
}

function renderImages() {
  gallery.innerHTML = "";

  const filtered = currentRoom === "all"
    ? allImages
    : allImages.filter(item => item.room === currentRoom);

  if (filtered.length === 0) {
    statusMessage.textContent = "No approved images found for this room yet.";
    return;
  }

  statusMessage.textContent =
    currentRoom === "all"
      ? `${filtered.length} approved images`
      : `${filtered.length} approved images in ${currentRoom}`;

  filtered.forEach(item => {
    const { data: imgData } = supabaseClient
      .storage
      .from("images")
      .getPublicUrl(item.image_file_name);

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = item.submission_id;

    if (highlightId && item.submission_id === highlightId) {
      card.classList.add("highlight");
      setTimeout(() => {
        card.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 300);
    }

    const img = document.createElement("img");
    img.src = imgData.publicUrl;
    img.alt = `${item.room} contribution`;

    img.onclick = () => {
      document.getElementById("modalImg").src = img.src;
      document.getElementById("modal").classList.add("open");
    };

    const info = document.createElement("div");
    info.className = "card-info";
    info.innerHTML = `
      <div class="room-tag ${getRoomClass(item.room)}">${item.room}</div>
      <div class="card-title">${item.room} Contribution</div>
      <div class="card-note-preview">${item.note || ""}</div>
    `;

    card.appendChild(img);
    card.appendChild(info);
    gallery.appendChild(card);
  });
}

async function loadImages() {
  const { data, error } = await supabaseClient
    .from("submissions")
    .select("image_file_name, room, note, submission_id, approval_status")
    .eq("approval_status", "approved");

  if (error) {
    console.error(error);
    statusMessage.textContent = "Error loading gallery";
    return;
  }

  allImages = data || [];
  renderImages();
}

filterButtons.forEach(button => {
  button.addEventListener("click", () => {
    filterButtons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
    currentRoom = button.dataset.room;
    renderImages();
  });
});

loadImages();
</script>

</body>
</html>
