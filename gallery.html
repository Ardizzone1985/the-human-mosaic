<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Gallery – The Human Mosaic</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
  font-family: Arial, sans-serif;
  background: url('hero-background.jpg') center/cover no-repeat fixed;
  padding: 40px;
  margin: 0;
}

.container {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 20px;
}

    h1 {
      text-align: center;
      font-size: clamp(2.2rem, 5vw, 4rem);
      margin-bottom: 14px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      max-width: 760px;
      margin: 0 auto 30px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .filter-btn {
      border: 1px solid #111;
      background: white;
      color: #111;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #111;
      color: white;
    }

    .top-actions {
      text-align: center;
      margin-bottom: 32px;
    }

    .join-btn {
      display: inline-block;
      text-decoration: none;
      background: #111;
      color: white;
      padding: 14px 22px;
      border-radius: 16px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .join-btn:hover {
      background: #333;
      transform: translateY(-1px);
    }

    .status-message {
      text-align: center;
      margin-bottom: 22px;
      color: #666;
      min-height: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #ddd;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .card-info {
      padding: 12px 14px;
    }

    .room-tag {
      display: inline-block;
      font-size: 0.78rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .cta-bottom {
      text-align: center;
      margin-top: 40px;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Live Gallery</h1>
    <p class="subtitle">
      Explore approved contributions from the three rooms of The Human Mosaic.
      Identity, Love, and Creativity are already taking shape.
    </p>

    <div class="top-actions">
      <a class="join-btn" href="join.html">Claim Your Spot</a>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-room="ALL">All Rooms</button>
      <button class="filter-btn" data-room="Identity">Identity</button>
      <button class="filter-btn" data-room="Love">Love</button>
      <button class="filter-btn" data-room="Creativity">Creativity</button>
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div class="grid" id="gallery"></div>

    <div class="cta-bottom">
      <a class="join-btn" href="join.html">Join The Human Mosaic</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://cqpujmwfiqbwdsmuwkmb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcHVqbXdmaXFid2RzbXV3a21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTMzODAsImV4cCI6MjA4OTg2OTM4MH0.lW9zvuBYYvrCvUoVApTCh0-ITuXwescPv3qJg1lNDDY";
    const BUCKET = "images";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const gallery = document.getElementById("gallery");
    const statusMessage = document.getElementById("statusMessage");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let currentRoom = "ALL";

    async function loadImages(roomFilter = "ALL") {
      gallery.innerHTML = "";
      statusMessage.textContent = "Loading gallery...";

      let query = supabaseClient
        .from("submissions")
        .select("image_file_name, room")
        .eq("approval_status", "approved");

      if (roomFilter !== "ALL") {
        query = query.eq("room", roomFilter);
      }

      const { data, error } = await query;

      console.log("DATA:", data);
      console.log("ERROR:", error);

      if (error) {
        statusMessage.textContent = "Error loading gallery.";
        statusMessage.className = "status-message error";
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        statusMessage.className = "status-message";
        statusMessage.textContent =
          roomFilter === "ALL"
            ? "No approved images yet."
            : `No approved images yet for ${roomFilter}.`;
        return;
      }

      statusMessage.className = "status-message";
      statusMessage.textContent =
        roomFilter === "ALL"
          ? `${data.length} approved image(s) currently visible`
          : `${data.length} approved image(s) in ${roomFilter}`;

      data.forEach(item => {
        if (!item.image_file_name) return;

        const { data: imgData } = supabaseClient
          .storage
          .from(BUCKET)
          .getPublicUrl(item.image_file_name);

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = imgData.publicUrl;
        img.alt = `${item.room} contribution`;

        const info = document.createElement("div");
        info.className = "card-info";

        const tag = document.createElement("div");
        tag.className = "room-tag";
        tag.textContent = item.room;

        info.appendChild(tag);
        card.appendChild(img);
        card.appendChild(info);

        img.onerror = () => {
          card.remove();
          console.error("Image not found:", item.image_file_name);
        };

        gallery.appendChild(card);
      });
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        currentRoom = button.dataset.room;
        loadImages(currentRoom);
      });
    });

    loadImages(currentRoom);
  </script>
</body>
</html>
