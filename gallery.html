<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Gallery – The Human Mosaic</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f6;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #ddd;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .error {
      color: red;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Live Gallery</h1>

  <div class="grid" id="gallery"></div>
  <div id="error" class="error"></div>

  <script>
    const SUPABASE_URL = "https://cqpujmwfiqbwdsmuwkmb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcHVqbXdmaXFid2RzbXV3a21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTMzODAsImV4cCI6MjA4OTg2OTM4MH0.lW9zvuBYYvrCvUoVApTCh0-ITuXwescPv3qJg1lNDDY"; // ← rimetti la tua key qui
    const BUCKET = "images";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadImages() {
  const { data, error } = await supabaseClient
    .from("submissions")
    .select("image_file_name")
    .eq("approval_status", "approved");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const errorBox = document.getElementById("error");
  const container = document.getElementById("gallery");

  container.innerHTML = "";
  errorBox.innerText = "";

  if (error) {
    errorBox.innerText = "Errore nel caricamento dati";
    console.error(error);
    return;
  }

  if (!data || data.length === 0) {
    errorBox.innerText = "Nessuna immagine trovata";
    return;
  }

  data.forEach(item => {
    if (!item.image_file_name) return;

    const { data: imgData } = supabaseClient
      .storage
      .from(BUCKET)
      .getPublicUrl(item.image_file_name);

    console.log("IMG URL:", imgData.publicUrl);

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = imgData.publicUrl;
    img.alt = "Gallery image";

    img.onerror = () => {
      console.error("Immagine non trovata:", item.image_file_name);
      card.remove();
    };

    card.appendChild(img);
    container.appendChild(card);
  });
}

loadImages();
  </script>

</body>
</html>
