<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Georgia, serif;
      text-align: center;
      padding: 60px;
      background: #f8f8f6;
    }

    .certificate {
      border: 4px solid gold;
      padding: 40px;
    }

    h1 { font-size: 40px; }
    .name { font-size: 32px; margin: 20px 0; }
  </style>
</head>
<body>

<div class="certificate">
  <h1>Certificate of Participation</h1>

  <p>This certifies that</p>

  <div class="name">{{NAME}}</div>

  <p>has secured a permanent position in The Human Mosaic</p>

  <p>Room: {{ROOM}}</p>
  <p>Wall: {{WALL}}</p>
  <p>Section: {{SECTION}}</p>
  <p>Spot: {{SPOT}}</p>

  <p>Submission ID: {{ID}}</p>
</div>

</body>
</html>
