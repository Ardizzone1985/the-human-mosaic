<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Approvals – The Human Mosaic</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f6;
      color: #111;
      padding: 40px;
    }

    .container {
      width: min(1200px, 94%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(2rem, 5vw, 3.5rem);
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    .logout-btn {
      border: 1px solid #111;
      background: white;
      color: #111;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #111;
      color: white;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .admin-stat-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .admin-stat-label {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 8px;
    }

    .admin-stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #111;
    }

    .status {
      margin-bottom: 18px;
      color: #666;
    }

    .status-filter-btn,
    .filter-btn {
      border: 1px solid #111;
      background: white;
      color: #111;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .status-filter-btn:hover,
    .status-filter-btn.active,
    .filter-btn:hover,
    .filter-btn.active {
      background: #111;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #eee;
      cursor: zoom-in;
    }

    .card-body {
      padding: 16px;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .badge-room-identity {
      background: #ece8ff;
      color: #4b2dbd;
    }

    .badge-room-love {
      background: #ffe7ee;
      color: #b42352;
    }

    .badge-room-creativity {
      background: #e8f7ee;
      color: #18794e;
    }

    .badge-status-pending {
      background: #fff4d6;
      color: #8a5a00;
    }

    .badge-status-approved {
      background: #e8f7ee;
      color: #18794e;
    }

    .badge-status-rejected {
      background: #fdecec;
      color: #b42318;
    }

    .meta {
      font-size: 0.92rem;
      color: #555;
      margin-bottom: 6px;
    }

    .card-top-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .approve-btn {
      background: #111;
      color: white;
    }

    .reject-btn {
      background: #eee;
      color: #111;
    }

    .open-btn {
      background: white;
      color: #111;
      border: 1px solid #111;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 700;
      display: inline-block;
    }

    .open-btn:hover {
      background: #111;
      color: white;
    }

    .note-preview {
      margin-top: 10px;
      padding: 10px 12px;
      background: #fcfcfb;
      border: 1px solid #ececec;
      border-radius: 12px;
      color: #444;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .note-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #777;
      margin-bottom: 6px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <script>
    if (sessionStorage.getItem("thm_admin_authenticated") !== "true") {
      window.location.href = "admin-login.html";
    }
  </script>

  <div class="container">
    <div class="topbar">
      <div>
        <h1>Admin Approvals</h1>
        <p>Review submissions and approve or reject them.</p>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="admin-stats">
      <div class="admin-stat-card">
        <div class="admin-stat-label">Pending</div>
        <div class="admin-stat-value" id="count-pending">—</div>
      </div>

      <div class="admin-stat-card">
        <div class="admin-stat-label">Approved</div>
        <div class="admin-stat-value" id="count-approved">—</div>
      </div>

      <div class="admin-stat-card">
        <div class="admin-stat-label">Rejected</div>
        <div class="admin-stat-value" id="count-rejected">—</div>
      </div>
    </div>

    <div id="status" class="status">Loading submissions...</div>

    <div class="status-filters" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;">
      <button class="status-filter-btn active" data-status="pending">Pending</button>
      <button class="status-filter-btn" data-status="approved">Approved</button>
      <button class="status-filter-btn" data-status="rejected">Rejected</button>
    </div>

    <div class="filters" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px;">
      <button class="filter-btn active" data-room="ALL">All Rooms</button>
      <button class="filter-btn" data-room="Identity">Identity</button>
      <button class="filter-btn" data-room="Love">Love</button>
      <button class="filter-btn" data-room="Creativity">Creativity</button>
    </div>

    <div class="ai-filters" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px;">
  <button class="filter-btn active ai-filter-btn" data-ai="ALL">All AI</button>
  <button class="filter-btn ai-filter-btn" data-ai="review">Review Only</button>
  <button class="filter-btn ai-filter-btn" data-ai="reject">Reject Only</button>
</div>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://cqpujmwfiqbwdsmuwkmb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcHVqbXdmaXFid2RzbXV3a21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTMzODAsImV4cCI6MjA4OTg2OTM4MH0.lW9zvuBYYvrCvUoVApTCh0-ITuXwescPv3qJg1lNDDY";
    const BUCKET = "images";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const grid = document.getElementById("grid");
    const statusBox = document.getElementById("status");

    let currentRoom = "ALL";
    let currentStatus = "pending";
    let currentAi = "ALL";

    function getRoomBadgeClass(room) {
      if (room === "Identity") return "badge-room-identity";
      if (room === "Love") return "badge-room-love";
      if (room === "Creativity") return "badge-room-creativity";
      return "";
    }

    function getStatusBadgeClass(status) {
      if (status === "pending") return "badge-status-pending";
      if (status === "approved") return "badge-status-approved";
      if (status === "rejected") return "badge-status-rejected";
      return "";
    }

    function getModerationBadgeClass(status) {
  if (status === "safe") return "badge-status-approved";
  if (status === "review") return "badge-status-pending";
  if (status === "reject") return "badge-status-rejected";
  return "";
}

    function formatDate(dateString) {
      if (!dateString) return "—";
      const date = new Date(dateString);
      return date.toLocaleString();
    }

    async function loadAdminStats() {
      const { data, error } = await supabaseClient
        .from("submissions")
        .select("approval_status");

      if (error) {
        console.error("Stats load error:", error);
        return;
      }

      let pending = 0;
      let approved = 0;
      let rejected = 0;

      data.forEach(item => {
        if (item.approval_status === "pending") pending++;
        if (item.approval_status === "approved") approved++;
        if (item.approval_status === "rejected") rejected++;
      });

      document.getElementById("count-pending").textContent = pending.toLocaleString();
      document.getElementById("count-approved").textContent = approved.toLocaleString();
      document.getElementById("count-rejected").textContent = rejected.toLocaleString();
    }

    async function loadSubmissions(statusFilter = "pending", roomFilter = "ALL", aiFilter = "ALL") {
  grid.innerHTML = "";
  statusBox.textContent = "Loading submissions...";

  let query = supabaseClient
    .from("submissions")
    .select("submission_id, full_name, room, slot_code, image_file_name, approval_status, created_at, note, moderation_status, moderation_reason, note_flagged, image_moderation_status, image_moderation_reason, image_flagged, slots!inner(payment_confirmed)")
    .eq("approval_status", statusFilter)
    .order("created_at", { ascending: false });

  if (roomFilter !== "ALL") {
    query = query.eq("room", roomFilter);
  }

  const { data, error } = await query;

  if (error) {
    console.error("Admin load error:", error);
    statusBox.textContent = "Error loading submissions.";
    return;
  }

  let filteredData = data || [];

  if (aiFilter !== "ALL") {
    filteredData = filteredData.filter(item =>
      item.moderation_status === aiFilter || item.image_moderation_status === aiFilter
    );
  }

  if (!filteredData || filteredData.length === 0) {
    statusBox.textContent =
      roomFilter === "ALL"
        ? `No ${statusFilter} submissions for AI filter "${aiFilter}".`
        : `No ${statusFilter} submissions for ${roomFilter} with AI filter "${aiFilter}".`;
    return;
  }

  statusBox.textContent =
    roomFilter === "ALL"
      ? `${filteredData.length} ${statusFilter} submission(s)`
      : `${filteredData.length} ${statusFilter} submission(s) in ${roomFilter}`;

  filteredData.forEach(item => {
    const { data: imgData } = supabaseClient
      .storage
      .from(BUCKET)
      .getPublicUrl(item.image_file_name);

    const showApprove = item.approval_status !== "approved";
    const showReject = item.approval_status !== "rejected";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${imgData.publicUrl}" alt="Submission image" onclick="window.open('${imgData.publicUrl}', '_blank')" />
      <div class="card-body">
        <div class="badges">
          <span class="badge ${getRoomBadgeClass(item.room)}">${item.room || "Unknown room"}</span>
          <span class="badge ${getStatusBadgeClass(item.approval_status)}">${item.approval_status || "unknown"}</span>
          <span class="badge ${getModerationBadgeClass(item.moderation_status)}">AI Note: ${item.moderation_status || "safe"}</span>
          <span class="badge ${getModerationBadgeClass(item.image_moderation_status)}">AI Image: ${item.image_moderation_status || "safe"}</span>
        </div>

        <div class="meta"><strong>Name:</strong> ${item.full_name || "—"}</div>
        <div class="meta"><strong>Slot:</strong> ${item.slot_code || "—"}</div>
        <div class="meta"><strong>Submission ID:</strong> ${item.submission_id || "—"}</div>
        <div class="meta"><strong>Submitted:</strong> ${formatDate(item.created_at)}</div>

        <div class="note-preview">
          <div class="note-label">Optional Note</div>
          <div>${item.note && item.note.trim() ? item.note : "No note provided."}</div>
        </div>

        <div class="note-preview">
          <div class="note-label">AI Moderation</div>
          <div>${item.moderation_reason && item.moderation_reason.trim() ? item.moderation_reason : "No moderation notes."}</div>
        </div>

        <div class="note-preview">
          <div class="note-label">AI Image Moderation</div>
          <div>${item.image_moderation_reason && item.image_moderation_reason.trim() ? item.image_moderation_reason : "No image moderation notes."}</div>
        </div>

        <div class="card-top-actions">
          <a class="open-btn" href="${imgData.publicUrl}" target="_blank">Open image</a>
        </div>

        <div class="actions">
          ${showApprove ? `<button class="approve-btn" onclick="approveSubmission('${item.submission_id}')">Approve</button>` : ""}
          ${showReject ? `<button class="reject-btn" onclick="rejectSubmission('${item.submission_id}')">Reject</button>` : ""}
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

    async function approveSubmission(submissionId) {
  // 1. aggiorna stato
  const { error } = await supabaseClient
    .from("submissions")
    .update({
      approval_status: "approved",
      approved_at: new Date().toISOString()
    })
    .eq("submission_id", submissionId);

  if (error) {
    alert("Approve error");
    console.error(error);
    return;
  }

  // 2. recupera dati completi submission
  const { data: submission, error: fetchError } = await supabaseClient
    .from("submissions")
    .select("*")
    .eq("submission_id", submissionId)
    .single();

  if (fetchError || !submission) {
    console.error("Fetch error:", fetchError);
    return;
  }

  // 3. invia email SOLO ORA
  try {
    await fetch("/api/send-email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        submissionId: submission.submission_id,
        fullName: submission.full_name,
        email: submission.email,
        room: submission.room,
        wall: submission.wall,
        section: submission.section,
        spot: submission.spot
      })
    });
  } catch (err) {
    console.error("Email send error:", err);
  }

  // 4. refresh UI
  await loadSubmissions(currentStatus, currentRoom, currentAi);
  await loadAdminStats();
}

    async function rejectSubmission(submissionId) {
  const { error } = await supabaseClient
    .from("submissions")
    .update({
      approval_status: "rejected"
    })
    .eq("submission_id", submissionId);

  if (error) {
    alert("Reject error");
    console.error(error);
    return;
  }

  const { data: submission, error: fetchError } = await supabaseClient
    .from("submissions")
    .select("*")
    .eq("submission_id", submissionId)
    .single();

  if (fetchError || !submission) {
    console.error("Fetch error:", fetchError);
    return;
  }

  try {
    await fetch("/api/reject-email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        submissionId: submission.submission_id,
        fullName: submission.full_name,
        email: submission.email,
        room: submission.room,
        wall: submission.wall,
        section: submission.section,
        spot: submission.spot,
        slotCode: submission.slot_code
      })
    });
  } catch (err) {
    console.error("Reject email send error:", err);
  }

  await loadSubmissions(currentStatus, currentRoom, currentAi);
  await loadAdminStats();
}

    document.getElementById("logoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem("thm_admin_authenticated");
      window.location.href = "admin-login.html";
    });

    const roomFilterButtons = document.querySelectorAll('.filters .filter-btn');
roomFilterButtons.forEach(button => {
  button.addEventListener("click", () => {
    roomFilterButtons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
    currentRoom = button.dataset.room;
    loadSubmissions(currentStatus, currentRoom, currentAi);
  });
});

const aiFilterButtons = document.querySelectorAll(".ai-filter-btn");
aiFilterButtons.forEach(button => {
  button.addEventListener("click", () => {
    aiFilterButtons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
    currentAi = button.dataset.ai;
    loadSubmissions(currentStatus, currentRoom, currentAi);
  });
});

const statusFilterButtons = document.querySelectorAll(".status-filter-btn");
statusFilterButtons.forEach(button => {
  button.addEventListener("click", () => {
    statusFilterButtons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
    currentStatus = button.dataset.status;
    loadSubmissions(currentStatus, currentRoom, currentAi);
  });
});

    window.approveSubmission = approveSubmission;
    window.rejectSubmission = rejectSubmission;

    loadSubmissions(currentStatus, currentRoom, currentAi);
    loadAdminStats();
  </script>
</body>
</html>
