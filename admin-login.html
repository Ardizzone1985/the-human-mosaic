<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – The Human Mosaic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f8f6;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: min(460px, 100%);
      background: white;
      border: 1px solid #ddd;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    p {
      color: #555;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d7d7d7;
      border-radius: 14px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      border: none;
      background: #111;
      color: white;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .error {
      margin-top: 14px;
      color: #b42318;
      font-size: 0.95rem;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin Login</h1>
    <p>Enter the admin password to access the approvals panel.</p>

    <form id="adminLoginForm">
      <label for="adminPassword">Password</label>
      <input type="password" id="adminPassword" required />
      <button type="submit">Enter Admin Panel</button>
      <div class="error" id="errorBox"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("adminLoginForm");
    const errorBox = document.getElementById("errorBox");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      errorBox.textContent = "";

      const password = document.getElementById("adminPassword").value;

      try {
        const res = await fetch("/api/admin-login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || "Login failed.";
          return;
        }

        sessionStorage.setItem("thm_admin_authenticated", "true");
        window.location.href = "admin-approvals.html";
      } catch (error) {
        errorBox.textContent = "Server error. Please try again.";
      }
    });
  </script>
</body>
</html>
