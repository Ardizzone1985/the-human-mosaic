<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Your Spot – The Human Mosaic</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f8f6;
      color: #1f1f1f;
    }

    header {
      border-bottom: 1px solid #ddd;
      background: rgba(255,255,255,0.95);
      position: sticky;
      top: 0;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
    }

    .hero {
      padding: 90px 0 50px;
    }

    .wall-tabs {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .wall-btn {
      border: 1px solid #111;
      background: white;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
    }

    .wall-btn.active {
      background: #111;
      color: white;
    }

    .top-panel {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }

    .spot-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .spot {
      aspect-ratio: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
    }

    .spot.taken {
      background: black;
      cursor: not-allowed;
    }

    .spot.selected {
      background: red;
    }

    .summary-card {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 20px;
    }

    .continue-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: black;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .continue-btn:disabled {
      background: #ccc;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <div class="container" style="display:flex; justify-content:space-between; padding:20px 0;">
    <a href="index.html">
      <img src="logo-cropped.png" style="height:80px;">
    </a>
    <div>ONE HUMANITY. MILLIONS OF FACES. ONE MOSAIC.</div>
  </div>
</header>

<main>

<section class="hero">
  <div class="container">
    <h1>Select your wall.<br>Choose your spot.</h1>

    <div class="wall-tabs">
      <button class="wall-btn active" data-wall="Front Wall">Front Wall</button>
      <button class="wall-btn" data-wall="Left Wall">Left Wall</button>
      <button class="wall-btn" data-wall="Right Wall">Right Wall</button>
    </div>
  </div>
</section>

<section>
  <div class="container top-panel">

    <div>
      <h2 id="gridTitle">Identity Room — Front Wall</h2>
      <div class="spot-grid" id="spotGrid"></div>
    </div>

    <div class="summary-card">
      <h3>Your Selection</h3>

      <p>Room: <strong>Identity</strong></p>
      <p>Wall: <strong id="summaryWall">Front Wall</strong></p>
      <p>Spot: <strong id="summarySpot">Not selected</strong></p>
      <p>Price: <strong>Up to €15</strong></p>

      <button id="continueBtn" class="continue-btn" disabled>Continue</button>
    </div>

  </div>
</section>

</main>

<footer>
  Contact: <a href="mailto:info@thehumanmosaic.art">info@thehumanmosaic.art</a>
</footer>

<script>
const spotGrid = document.getElementById("spotGrid");
const summaryWall = document.getElementById("summaryWall");
const summarySpot = document.getElementById("summarySpot");
const continueBtn = document.getElementById("continueBtn");
const gridTitle = document.getElementById("gridTitle");
const wallButtons = document.querySelectorAll(".wall-btn");

let selectedWall = "Front Wall";
let selectedSpot = null;

function generateGrid() {
  spotGrid.innerHTML = "";
  selectedSpot = null;
  summarySpot.textContent = "Not selected";
  continueBtn.disabled = true;

  for (let i = 1; i <= 60; i++) {
    const spot = document.createElement("div");
    spot.className = "spot";

    const row = String.fromCharCode(64 + Math.ceil(i / 10));
    const col = ((i - 1) % 10) + 1;
    const code = `${row}-${col}`;

    const taken = i % 7 === 0;
    if (taken) {
      spot.classList.add("taken");
    } else {
      spot.addEventListener("click", () => {
        document.querySelectorAll(".spot.selected").forEach(el => el.classList.remove("selected"));
        spot.classList.add("selected");
        selectedSpot = code;
        summarySpot.textContent = code;
        continueBtn.disabled = false;
      });
    }

    spotGrid.appendChild(spot);
  }
}

wallButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    wallButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    selectedWall = btn.dataset.wall;
    summaryWall.textContent = selectedWall;
    gridTitle.textContent = `Identity Room — ${selectedWall}`;

    generateGrid();
  });
});

continueBtn.addEventListener("click", () => {
  if (!selectedSpot) return;

  const room = "Identity";
  const wall = encodeURIComponent(selectedWall);
  const spot = encodeURIComponent(selectedSpot);
  const price = encodeURIComponent("Up to €15");

  window.location.href = `checkout.html?room=${room}&wall=${wall}&spot=${spot}&price=${price}`;
});

generateGrid();
</script>

</body>
</html>
